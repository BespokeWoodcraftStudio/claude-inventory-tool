name: Bug report
description: Report something that's broken in the scanner, the web app, or the setup wizard.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.

        **Before you post:** if you think a real secret, token, or absolute `/Users/<name>/` path
        ended up in `stack-cleaner.json` (a redaction failure), **do not file it here.** That is a
        security issue. Report it privately — see [SECURITY.md](https://github.com/BespokeWoodcraftStudio/stack-cleaner/blob/main/SECURITY.md).
        Public issues are world-readable forever.

        For everything else, the more detail you give, the faster we can help.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened, and what did you expect?
      description: Describe the actual behavior, then what you expected instead.
      placeholder: |
        What happened: ...
        Expected: ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A numbered list is ideal. Include the exact command you ran, if any.
      placeholder: |
        1. Ran `node public/scan.mjs`
        2. Dropped stack-cleaner.json into the web app
        3. ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`.
      placeholder: v20.11.0
    validations:
      required: false
  - type: input
    id: generator
    attributes:
      label: scan.mjs version
      description: The `generator` field from your stack-cleaner.json (for example, `scan.mjs@1.0.0`).
      placeholder: scan.mjs@1.0.0
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      description: Where did the problem occur?
      options:
        - Scanner (public/scan.mjs)
        - Web app (the inventory viewer)
        - Setup wizard (/setup)
    validations:
      required: true
  - type: checkboxes
    id: redaction-ack
    attributes:
      label: Secret check
      options:
        - label: I have removed all secrets, tokens, and absolute /Users/ paths from any pasted output or screenshots.
          required: true
